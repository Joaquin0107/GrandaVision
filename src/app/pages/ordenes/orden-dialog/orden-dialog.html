<h2 mat-dialog-title>{{ esEdicion ? 'Editar orden de compra' : 'Nueva orden de compra' }}</h2>

<form [formGroup]="form" (ngSubmit)="guardar()">
  <mat-dialog-content class="gv-dialog-grid">
    <mat-form-field appearance="outline">
      <mat-label>N.° de orden</mat-label>
      <input matInput formControlName="numeroOrden" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Proveedor</mat-label>
      <mat-select formControlName="proveedor">
        @for (p of data.proveedores; track p.id) {
          <mat-option [value]="p.nombre">{{ p.nombre }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Producto</mat-label>
      <mat-select formControlName="productoId">
        @for (p of data.productos; track p.id) {
          <mat-option [value]="p.id">{{ p.nombre }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Cantidad</mat-label>
      <input matInput type="number" formControlName="cantidad" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Fecha</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="fecha" />
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Estado</mat-label>
      <mat-select formControlName="estado">
        <mat-option value="Pendiente">Pendiente</mat-option>
        <mat-option value="En proceso">En proceso</mat-option>
        <mat-option value="Recibida">Recibida</mat-option>
      </mat-select>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancelar()">Cancelar</button>
    <button mat-flat-button color="primary" type="submit">Guardar</button>
  </mat-dialog-actions>
</form>

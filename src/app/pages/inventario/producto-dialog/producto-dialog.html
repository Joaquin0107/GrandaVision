<h2 mat-dialog-title>{{ esEdicion ? 'Editar producto' : 'Registrar producto' }}</h2>

<form [formGroup]="form" (ngSubmit)="guardar()">
  <mat-dialog-content class="gv-dialog-grid">
    <mat-form-field appearance="outline">
      <mat-label>Código</mat-label>
      <input matInput formControlName="codigo" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="nombre" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Categoría</mat-label>
      <input matInput formControlName="categoria" list="categorias-existentes" />
      <datalist id="categorias-existentes">
        @for (c of data.categorias; track c) {
          <option [value]="c"></option>
        }
      </datalist>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Proveedor</mat-label>
      <input matInput formControlName="proveedor" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Stock actual</mat-label>
      <input matInput type="number" formControlName="stockActual" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Stock mínimo</mat-label>
      <input matInput type="number" formControlName="stockMinimo" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Stock máximo</mat-label>
      <input matInput type="number" formControlName="stockMaximo" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Precio (S/.)</mat-label>
      <input matInput type="number" formControlName="precio" />
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancelar()">Cancelar</button>
    <button mat-flat-button color="primary" type="submit">Guardar</button>
  </mat-dialog-actions>
</form>
